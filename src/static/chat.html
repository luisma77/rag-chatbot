<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Chatbot — APD</title>
  <style>
    /* ── Reset & base ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --accent: #5b7cf7;
      --accent-hover: #7b96ff;
      --text: #e8eaf6;
      --text-muted: #8892b0;
      --user-bg: #1e3a5f;
      --bot-bg: #1a1d27;
      --shadow: 0 4px 24px rgba(0,0,0,.45);
      --radius: 14px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ───────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), #9b59b6);
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 18px; font-weight: 800; color: #fff;
    }
    .header-info h1 { font-size: 15px; font-weight: 700; }
    .header-info p  { font-size: 12px; color: var(--text-muted); }
    .status-dot {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-muted);
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #4caf50;
      box-shadow: 0 0 6px #4caf50;
      animation: pulse 2s ease-in-out infinite;
    }
    .dot.offline { background: #f44336; box-shadow: 0 0 6px #f44336; animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

    /* ── Messages ─────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .bubble-wrap {
      display: flex;
      gap: 10px;
      max-width: 820px;
      width: 100%;
    }
    .bubble-wrap.user  { align-self: flex-end; flex-direction: row-reverse; }
    .bubble-wrap.bot   { align-self: flex-start; }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      flex-shrink: 0;
      display: grid; place-items: center;
      font-size: 14px;
    }
    .avatar.bot  { background: linear-gradient(135deg, var(--accent), #9b59b6); }
    .avatar.user { background: var(--user-bg); border: 1px solid var(--border); }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
      max-width: 680px;
      word-break: break-word;
      position: relative;
    }
    .bubble-wrap.bot  .bubble { background: var(--bot-bg); border: 1px solid var(--border); }
    .bubble-wrap.user .bubble { background: var(--user-bg); border: 1px solid #1e4a7f; }

    .bubble pre {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      overflow-x: auto;
      font-size: 12.5px;
      margin-top: 8px;
    }
    .bubble code { font-family: 'Consolas', 'Fira Code', monospace; }
    .bubble p + p { margin-top: 8px; }

    /* ── Typing indicator ─────────────────────────── */
    .typing .dot-1, .typing .dot-2, .typing .dot-3 {
      display: inline-block;
      width: 7px; height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce .8s ease-in-out infinite;
    }
    .typing .dot-2 { animation-delay: .15s; }
    .typing .dot-3 { animation-delay: .30s; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

    /* ── Empty state ──────────────────────────────── */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 20px;
    }
    #empty-state .big-icon { font-size: 48px; }
    #empty-state h2 { font-size: 18px; color: var(--text); }
    #empty-state p  { font-size: 13px; max-width: 380px; }
    .suggestions {
      display: flex; flex-wrap: wrap;
      gap: 8px; justify-content: center;
      margin-top: 8px;
    }
    .chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12.5px;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Input area ───────────────────────────────── */
    #input-area {
      padding: 14px 16px 18px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      transition: border-color .2s;
    }
    .input-row:focus-within { border-color: var(--accent); }
    #user-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      resize: none;
      max-height: 160px;
      line-height: 1.5;
    }
    #user-input::placeholder { color: var(--text-muted); }
    #send-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: grid; place-items: center;
      flex-shrink: 0;
      transition: background .2s, transform .1s;
    }
    #send-btn:hover:not(:disabled) { background: var(--accent-hover); }
    #send-btn:active:not(:disabled) { transform: scale(.92); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; }
    #send-btn svg { pointer-events: none; }
    .hint { font-size: 11px; color: var(--text-muted); text-align: right; margin-top: 6px; }
  </style>
</head>
<body>

<header>
  <div class="logo">R</div>
  <div class="header-info">
    <h1>RAG Chatbot</h1>
    <p>Consulta de documentación interna</p>
  </div>
  <div class="status-dot" id="status-indicator">
    <span class="dot" id="status-dot"></span>
    <span id="status-text">Conectando...</span>
  </div>
</header>

<div id="messages" role="log" aria-live="polite">
  <div id="empty-state">
    <span class="big-icon">💬</span>
    <h2>¿En qué puedo ayudarte?</h2>
    <p>Haz una pregunta sobre los documentos internos de la empresa.</p>
    <div class="suggestions" id="suggestions">
      <button class="chip" onclick="askChip(this)">¿Cuál es la política de igualdad?</button>
      <button class="chip" onclick="askChip(this)">¿Qué incluye el manual de acogida?</button>
      <button class="chip" onclick="askChip(this)">¿Cómo es la identidad corporativa?</button>
      <button class="chip" onclick="askChip(this)">¿Cuáles son los valores de la empresa?</button>
    </div>
  </div>
</div>

<div id="input-area">
  <div class="input-row">
    <textarea id="user-input" rows="1" placeholder="Escribe tu pregunta..." aria-label="Mensaje"></textarea>
    <button id="send-btn" aria-label="Enviar" disabled>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <p class="hint">Enter para enviar · Shift+Enter para nueva línea</p>
</div>

<script>
  // If opened as a local file (file://) redirect to the server URL
  if (window.location.protocol === 'file:') {
    document.body.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;gap:16px;font-family:sans-serif;color:#e8eaf6;background:#0f1117;text-align:center;padding:20px">
        <div style="font-size:48px">⚠️</div>
        <h2 style="font-size:20px">Abre el chat a través del servidor</h2>
        <p style="color:#8892b0;max-width:420px">Este archivo está abierto como fichero local. Para que funcione necesitas acceder a través de FastAPI.</p>
        <a href="http://localhost:8000/static/chat.html"
           style="margin-top:8px;padding:12px 28px;background:#5b7cf7;color:#fff;border-radius:10px;text-decoration:none;font-weight:600;font-size:15px">
          Abrir en http://localhost:8000/static/chat.html
        </a>
        <p style="color:#8892b0;font-size:12px">Asegúrate de que el bot esté arrancado con run-chatbot.bat primero.</p>
      </div>`;
  }

  const API_BASE = window.location.origin;   // same host as FastAPI
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');
  const emptyState = document.getElementById('empty-state');
  const statusDot  = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');

  // Session ID — persists for this browser tab (clears when tab closes = new session)
  const SESSION_ID = (() => {
    let id = sessionStorage.getItem('rag_session_id');
    if (!id) {
      id = crypto.randomUUID ? crypto.randomUUID()
           : Math.random().toString(36).slice(2) + Date.now().toString(36);
      sessionStorage.setItem('rag_session_id', id);
    }
    return id;
  })();

  let isWaiting = false;

  // ── Health check ─────────────────────────────────
  async function checkHealth() {
    try {
      const r = await fetch(`${API_BASE}/health`, { signal: AbortSignal.timeout(5000) });
      if (r.ok) {
        statusDot.classList.remove('offline');
        statusText.textContent = 'En línea';
        sendBtn.disabled = false;
      } else throw new Error();
    } catch {
      statusDot.classList.add('offline');
      statusText.textContent = 'Sin conexión';
      sendBtn.disabled = true;
    }
  }
  checkHealth();
  setInterval(checkHealth, 15000);

  // ── Auto-resize textarea ──────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
    sendBtn.disabled = isWaiting || inputEl.value.trim() === '';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  // ── Suggestion chips ──────────────────────────────
  function askChip(btn) {
    inputEl.value = btn.textContent;
    inputEl.dispatchEvent(new Event('input'));
    sendMessage();
  }

  // ── Build a message bubble ────────────────────────
  function addBubble(role, html, sources) {
    if (emptyState.parentNode) emptyState.remove();

    const wrap = document.createElement('div');
    wrap.className = `bubble-wrap ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'user' ? '👤' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = html;

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  // ── Typing indicator ──────────────────────────────
  function addTyping() {
    if (emptyState.parentNode) emptyState.remove();
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap bot';
    wrap.id = 'typing-indicator';
    const avatar = document.createElement('div');
    avatar.className = 'avatar bot'; avatar.textContent = '🤖';
    const bubble = document.createElement('div');
    bubble.className = 'bubble typing';
    bubble.innerHTML = '<span class="dot-1"></span><span class="dot-2"></span><span class="dot-3"></span>';
    wrap.appendChild(avatar); wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
  function removeTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  // ── Send message ──────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isWaiting) return;

    isWaiting = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    addBubble('user', escapeHtml(text).replace(/\n/g, '<br>'));
    addTyping();

    try {
      const resp = await fetch(`${API_BASE}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: text, session_id: SESSION_ID }),
        signal: AbortSignal.timeout(120000),
      });

      removeTyping();

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        let detail = err.detail ?? 'Error desconocido';
        if (Array.isArray(detail)) detail = detail.map(e => e.msg || JSON.stringify(e)).join('; ');
        if (typeof detail === 'object') detail = JSON.stringify(detail);
        addBubble('bot', `<span style="color:#f66">⚠️ Error ${resp.status}: ${escapeHtml(String(detail))}</span>`);
        return;
      }

      const data = await resp.json();
      const rawAnswer = data.answer || data.response || data.message || JSON.stringify(data);
      const { clean } = extractInlineSources(rawAnswer);
      addBubble('bot', formatAnswer(clean));
    } catch (err) {
      removeTyping();
      const msg = err.name === 'TimeoutError'
        ? '⏱️ Tiempo de espera agotado. El modelo puede estar cargando, intenta de nuevo.'
        : `⚠️ No se pudo conectar con el servidor: ${escapeHtml(err.message)}`;
      addBubble('bot', `<span style="color:#f66">${msg}</span>`);
    } finally {
      isWaiting = false;
      sendBtn.disabled = inputEl.value.trim() === '';
      inputEl.focus();
    }
  }

  // ── Helpers ───────────────────────────────────────
  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /**
   * Extrae los [Fuente: X] del texto y los devuelve como array.
   * Devuelve { clean: string, inlineSources: string[] }
   */
  function extractInlineSources(text) {
    const inlineSources = [];
    const seen = new Set();
    // Captura [Fuente: nombre] o [Fuentes: nombre1, nombre2]
    const clean = text.replace(/\[Fuentes?:\s*([^\]]+)\]/gi, (_, match) => {
      match.split(',').forEach(s => {
        const name = s.trim();
        if (name && !seen.has(name)) {
          seen.add(name);
          inlineSources.push({ file: name });
        }
      });
      return '';          // elimina el texto del body
    }).replace(/\s{2,}/g, ' ').trim();
    return { clean, inlineSources };
  }

  function formatAnswer(text) {
    // Basic markdown-like formatting
    let html = escapeHtml(text)
      // Code blocks
      .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
      // Inline code
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      // Bold
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      // Italic
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      // Line breaks
      .replace(/\n/g, '<br>');

    // Numbered and bullet lists
    html = html
      .replace(/((?:&lt;br&gt;|\n|^)\s*\d+\. .+)+/g, s => `<ol>${s.replace(/(?:&lt;br&gt;|\n|^)\s*\d+\. (.+)/g, '<li>$1</li>')}</ol>`)
      .replace(/((?:<br>|^)\s*[-•] .+)+/g, s => `<ul>${s.replace(/(?:<br>|^)\s*[-•] (.+)/g, '<li>$1</li>')}</ul>`);

    return html;
  }
</script>
</body>
</html>
